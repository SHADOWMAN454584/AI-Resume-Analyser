# ─── render.yaml ────────────────────────────────────────────
# Render Blueprint – deploys the full-stack ResumeAI app as a
# single Web Service (Flask serves both API + React frontend).
# ────────────────────────────────────────────────────────────

databases:
  - name: resumeai-db
    plan: free
    databaseName: resumeai
    user: resumeai

services:
  - type: web
    name: resumeai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      chmod +x build.sh && ./build.sh
      cd ../frontend && npm install && npm run build
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: resumeai-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: CORS_ORIGINS
        value: "*"
